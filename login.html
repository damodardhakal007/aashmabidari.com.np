<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Login - Aashma Bidari Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        :root {
            --primary: #007F73;
            --primary-dark: #005f56;
            --primary-light: #d5fdf9;
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --red-500: #ef4444;
            --green-500: #10b981;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 2rem;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            padding: 3rem;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .login-header .logo-icon i {
            font-size: 28px;
            color: var(--primary);
        }

        .login-header h1 {
            font-size: 1.75rem;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--gray-500);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-500);
            font-size: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 0.95rem;
            color: var(--gray-900);
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 127, 115, 0.1);
        }

        .input-wrapper input::placeholder {
            color: var(--gray-300);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray-500);
            font-size: 18px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .remember-me label {
            font-size: 0.85rem;
            color: var(--gray-700);
            cursor: pointer;
        }

        .forgot-password {
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 127, 115, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: var(--red-500);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            align-items: center;
            gap: 0.5rem;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            display: none;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: var(--green-500);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            align-items: center;
            gap: 0.5rem;
        }

        .success-message.show {
            display: flex;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray-500);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .back-link i {
            font-size: 14px;
        }

        /* Forgot Password Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.3s ease;
        }

        .modal h2 {
            font-size: 1.25rem;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .modal p {
            color: var(--gray-500);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cancel {
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            color: var(--gray-700);
        }

        .btn-cancel:hover {
            background: var(--gray-200);
        }

        .btn-submit {
            background: var(--primary);
            border: none;
            color: var(--white);
        }

        .btn-submit:hover {
            background: var(--primary-dark);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
            .form-options {
                flex-direction: column;
                gap: 0.75rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <i class='bx bx-lock-alt'></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to access the admin dashboard</p>
        </div>

        <div class="error-message" id="errorMsg">
            <i class='bx bx-error-circle'></i>
            <span id="errorText">Invalid username or password</span>
        </div>

        <div class="success-message" id="successMsg">
            <i class='bx bx-check-circle'></i>
            <span id="successText">Login successful! Redirecting...</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class='bx bx-user'></i>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    <i class='bx bx-hide toggle-password' id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="forgot-password" onclick="showForgotPassword(event)">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <span class="spinner" id="spinner"></span>
            </button>
        </form>

        <a href="index.html" class="back-link">
            <i class='bx bx-arrow-back'></i> Back to Website
        </a>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal">
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you instructions to reset your password.</p>
            <div class="form-group">
                <label for="resetEmail">Email Address</label>
                <div class="input-wrapper">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="resetEmail" placeholder="admin@aashmabidari.com.np">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeForgotPassword()">Cancel</button>
                <button class="btn-submit" onclick="handleForgotPassword()">Send Reset Link</button>
            </div>
        </div>
    </div>

    <script>
        // Admin Authentication System
        const AUTH_KEY = 'aashma_admin_auth';
        const USERS_KEY = 'aashma_admin_users';
        const ACTIVITY_KEY = 'aashma_activity_log';

        // Initialize default admin user if not exists
        function initializeUsers() {
            const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
            if (users.length === 0) {
                const defaultAdmin = {
                    id: 'usr_001',
                    username: 'damodardhakal007',
                    password: hashPassword('Admin@123'),
                    email: 'admin@aashmabidari.com.np',
                    role: 'admin',
                    fullName: 'Damodar Dhakal',
                    avatar: '',
                    createdAt: new Date().toISOString(),
                    lastLogin: null,
                    isActive: true
                };
                users.push(defaultAdmin);
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
            }
        }

        // Simple hash function for passwords (for demo - in production use bcrypt on server)
        function hashPassword(password) {
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                const char = password.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return 'hashed_' + Math.abs(hash).toString(36) + '_' + btoa(password).replace(/=/g, '');
        }

        // Verify password
        function verifyPassword(input, stored) {
            return hashPassword(input) === stored;
        }

        // Handle login
        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.querySelector('.btn-text');

            // Hide messages
            hideMessages();

            // Show loading
            loginBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'Signing in...';

            // Simulate network delay
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
                const user = users.find(u => u.username === username);

                if (user && verifyPassword(password, user.password)) {
                    if (!user.isActive) {
                        showError('Your account has been disabled. Contact the administrator.');
                        resetButton();
                        return;
                    }

                    // Update last login
                    user.lastLogin = new Date().toISOString();
                    localStorage.setItem(USERS_KEY, JSON.stringify(users));

                    // Create session
                    const session = {
                        userId: user.id,
                        username: user.username,
                        role: user.role,
                        fullName: user.fullName,
                        loginTime: new Date().toISOString(),
                        rememberMe: rememberMe
                    };

                    if (rememberMe) {
                        localStorage.setItem(AUTH_KEY, JSON.stringify(session));
                    } else {
                        sessionStorage.setItem(AUTH_KEY, JSON.stringify(session));
                    }

                    // Log activity
                    logActivity('login', `${user.fullName} logged in`, user.username);

                    // Show success
                    showSuccess('Login successful! Redirecting...');

                    setTimeout(() => {
                        window.location.href = 'admin/index.html';
                    }, 1000);
                } else {
                    showError('Invalid username or password. Please try again.');
                    logActivity('failed_login', `Failed login attempt for username: ${username}`, 'unknown');
                    resetButton();
                }
            }, 800);
        }

        function logActivity(type, description, user) {
            const logs = JSON.parse(localStorage.getItem(ACTIVITY_KEY) || '[]');
            logs.unshift({
                id: 'log_' + Date.now(),
                type: type,
                description: description,
                user: user,
                timestamp: new Date().toISOString()
            });
            // Keep only last 100 logs
            if (logs.length > 100) logs.pop();
            localStorage.setItem(ACTIVITY_KEY, JSON.stringify(logs));
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            document.getElementById('errorText').textContent = message;
            errorMsg.classList.add('show');
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            document.getElementById('successText').textContent = message;
            successMsg.classList.add('show');
        }

        function hideMessages() {
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        function resetButton() {
            const loginBtn = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.querySelector('.btn-text');
            loginBtn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Sign In';
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bx-hide');
                toggleIcon.classList.add('bx-show');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bx-show');
                toggleIcon.classList.add('bx-hide');
            }
        }

        function showForgotPassword(event) {
            event.preventDefault();
            document.getElementById('forgotModal').classList.add('show');
        }

        function closeForgotPassword() {
            document.getElementById('forgotModal').classList.remove('show');
        }

        function handleForgotPassword() {
            const email = document.getElementById('resetEmail').value;
            if (email) {
                closeForgotPassword();
                showSuccess('Password reset instructions have been sent to your email.');
            }
        }

        // Check if already logged in
        function checkExistingSession() {
            const session = JSON.parse(localStorage.getItem(AUTH_KEY) || sessionStorage.getItem(AUTH_KEY) || 'null');
            if (session) {
                window.location.href = 'admin/index.html';
            }
        }

        // Initialize
        initializeUsers();
        checkExistingSession();

        // Close modal on outside click
        document.getElementById('forgotModal').addEventListener('click', function(e) {
            if (e.target === this) closeForgotPassword();
        });
    </script>
</body>
</html>
