<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal · Kavresthali Secondary School</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; }
        .portal-wrapper { display: grid; grid-template-columns: 270px 1fr; min-height: 100vh; background: var(--bg-dark); }
        .portal-sidebar { background: linear-gradient(180deg,rgba(8,21,37,.9) 0%,rgba(6,16,26,.97) 100%); border-right: 1px solid rgba(0,245,255,.1); display: flex; flex-direction: column; }
        .portal-logo { padding: 20px 20px 18px; border-bottom: 1px dashed rgba(255,255,255,.08); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .portal-logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg,var(--cyan),var(--magenta)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--bg-dark); font-weight: 900; flex-shrink: 0; }
        .portal-logo-text h2 { font-size: 17px; color: var(--cyan); margin: 0; }
        .portal-logo-text p { font-size: 10px; color: var(--text-muted); margin: 2px 0 0; }
        .portal-nav { flex: 1; margin-top: 16px; padding: 0; list-style: none; overflow-y: auto; }
        .portal-nav li { margin: 0; }
        .portal-nav a { display: flex; align-items: center; gap: 10px; padding: 11px 20px; color: var(--text-muted); text-decoration: none; font-size: 13px; border-left: 3px solid transparent; transition: all .25s ease; cursor: pointer; position: relative; }
        .portal-nav a i { font-size: 17px; min-width: 20px; }
        .portal-nav a:hover { color: var(--cyan); background: rgba(0,245,255,.07); border-left-color: var(--cyan); }
        .portal-nav a.active { color: var(--cyan); background: rgba(0,245,255,.12); border-left-color: var(--magenta); font-weight: 700; }
        .portal-nav .section-label { padding: 14px 20px 6px; font-size: 9px; font-weight: 900; color: rgba(255,255,255,.25); text-transform: uppercase; letter-spacing: .1em; }
        .nav-badge { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: var(--coral); color: #fff; border-radius: 10px; font-size: 10px; font-weight: 900; padding: 1px 6px; min-width: 18px; text-align: center; }
        .portal-back { padding: 14px 20px; border-top: 1px dashed rgba(255,255,255,.08); flex-shrink: 0; }
        .portal-back a { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,.35); text-decoration: none; font-size: 12px; font-weight: 600; transition: color .2s; }
        .portal-back a:hover { color: var(--cyan); }
        .portal-main { padding: 28px 32px; overflow-y: auto; color: var(--text-light); }
        .portal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px dashed rgba(255,255,255,.08); gap: 16px; flex-wrap: wrap; }
        .portal-header-left h1 { font-size: 26px; margin: 0 0 3px; }
        .portal-header-left p { color: var(--text-muted); font-size: 13px; margin: 0; }
        .portal-header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .portal-user { display: flex; align-items: center; gap: 10px; padding: 7px 12px; background: rgba(0,245,255,.08); border-radius: 8px; border: 1px solid rgba(0,245,255,.15); cursor: pointer; }
        .portal-user:hover { border-color: rgba(0,245,255,.35); }
        .portal-user-avatar { width: 30px; height: 30px; background: linear-gradient(135deg,var(--cyan),var(--magenta)); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--bg-dark); font-weight: 900; font-size: 13px; overflow: hidden; flex-shrink: 0; }
        .portal-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .portal-user-name { font-size: 12px; font-weight: 700; color: var(--cyan); }
        .portal-user-role { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .portal-logout { padding: 7px 14px; background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.3); border-radius: 6px; color: #ff9999; cursor: pointer; font-size: 12px; font-weight: 700; transition: all .25s; }
        .portal-logout:hover { background: rgba(255,107,107,.22); }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); gap: 20px; margin-bottom: 28px; }
        .dashboard-card { padding: 22px; background: linear-gradient(135deg,rgba(8,21,37,.6),rgba(8,21,37,.85)); border: 1px solid rgba(0,245,255,.14); border-radius: 12px; transition: all .25s; }
        .dashboard-card:hover { border-color: rgba(0,245,255,.3); box-shadow: 0 0 18px rgba(0,245,255,.12); }
        .dashboard-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .dashboard-card-icon { width: 42px; height: 42px; background: linear-gradient(135deg,rgba(0,245,255,.18),rgba(255,0,229,.08)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--cyan); flex-shrink: 0; }
        .dashboard-card h3 { margin: 0; font-size: 15px; color: var(--cyan); font-weight: 700; }
        .dashboard-card p { color: var(--text-muted); font-size: 12px; margin: 6px 0 0; }
        .dashboard-card-stat { margin-top: 14px; padding-top: 14px; border-top: 1px dashed rgba(255,255,255,.07); }
        .dashboard-card-stat-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; margin-bottom: 3px; }
        .dashboard-card-stat-value { font-size: 26px; font-weight: 900; color: var(--gold); }
        .portal-table-wrapper { overflow-x: auto; }
        .portal-table { width: 100%; border-collapse: collapse; background: rgba(8,21,37,.35); border: 1px solid rgba(0,245,255,.1); border-radius: 8px; overflow: hidden; }
        .portal-table thead tr { background: rgba(0,245,255,.07); border-bottom: 1px solid rgba(0,245,255,.14); }
        .portal-table th { padding: 11px 14px; text-align: left; color: var(--cyan); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
        .portal-table td { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,.04); color: var(--text-light); font-size: 12.5px; vertical-align: middle; }
        .portal-table tr:last-child td { border-bottom: none; }
        .portal-table tr:hover td { background: rgba(0,245,255,.03); }
        .status-pass { color: var(--emerald); font-weight: 700; }
        .status-fail { color: var(--coral); font-weight: 700; }
        .status-pending { color: var(--gold); font-weight: 700; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--cyan); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
        .form-group input,.form-group select,.form-group textarea { width: 100%; padding: 9px 11px; background: rgba(255,255,255,.05); border: 1px solid rgba(0,245,255,.2); border-radius: 6px; color: var(--text-light); font-size: 13px; font-family: inherit; }
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus { outline: none; border-color: var(--cyan); background: rgba(0,245,255,.07); }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
        .btn-submit { padding: 9px 18px; background: linear-gradient(90deg,var(--cyan),var(--magenta)); border: none; border-radius: 6px; color: var(--bg-dark); font-weight: 700; cursor: pointer; transition: all .25s; font-size: 13px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 0 14px rgba(0,245,255,.3); }
        .btn-secondary { padding: 9px 18px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18); border-radius: 6px; color: var(--text-light); font-weight: 700; cursor: pointer; transition: all .25s; font-size: 13px; }
        .btn-secondary:hover { background: rgba(255,255,255,.14); }
        .btn-danger { padding: 9px 18px; background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.3); border-radius: 6px; color: #ff9999; font-weight: 700; cursor: pointer; transition: all .25s; font-size: 13px; }
        .btn-danger:hover { background: rgba(255,107,107,.22); }
        .btn-sm { padding: 5px 10px; font-size: 11px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.82); z-index: 5000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg,rgba(8,21,37,.97),rgba(6,16,26,.99)); border: 1px solid rgba(0,245,255,.2); border-radius: 14px; padding: 30px; max-width: 620px; width: 92%; box-shadow: 0 0 60px rgba(0,245,255,.18); max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; line-height: 1; }
        .modal-close:hover { color: var(--cyan); }
        .modal-title { font-size: 20px; color: var(--cyan); margin-bottom: 18px; font-weight: 700; }
        /* Profile */
        .profile-avatar-wrap { width: 110px; height: 110px; border-radius: 50%; background: linear-gradient(135deg,var(--cyan),var(--magenta)); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 44px; font-weight: 900; color: var(--bg-dark); overflow: hidden; box-shadow: 0 0 28px rgba(0,245,255,.3); cursor: pointer; position: relative; }
        .profile-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; font-size: 26px; color: #fff; border-radius: 50%; }
        .profile-avatar-wrap:hover .profile-avatar-overlay { opacity: 1; }
        /* Pending badge */
        .pending-alert { background: rgba(255,215,0,.1); border: 1px solid rgba(255,215,0,.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; color: var(--gold); font-size: 13px; display: flex; align-items: center; gap: 8px; }
        /* Notice pills */
        .notice-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-right: 6px; }
        .pill-urgent { background: rgba(255,107,107,.2); color: #ff9999; }
        .pill-event  { background: rgba(96,165,250,.2); color: #93c5fd; }
        .pill-acad   { background: rgba(0,245,255,.15); color: var(--cyan); }
        .pill-info   { background: rgba(192,132,252,.2); color: #c4b5fd; }
        /* Homepage editor tabs */
        .editor-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
        .editor-tab { padding: 7px 14px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 6px; color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; }
        .editor-tab.active,.editor-tab:hover { background: rgba(0,245,255,.12); border-color: rgba(0,245,255,.4); color: var(--cyan); }
        .editor-panel { display: none; }
        .editor-panel.active { display: block; }
        /* Msg banner */
        .portal-msg { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .portal-msg.success { background: rgba(0,255,157,.12); border: 1px solid rgba(0,255,157,.3); color: #00ff9d; }
        .portal-msg.error   { background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.3); color: #ff9999; }
        /* Security log */
        .sec-row-warn { background: rgba(255,107,107,.05); }
        /* Leadership order controls */
        .order-btn { padding: 3px 8px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 4px; color: var(--text-light); cursor: pointer; font-size: 12px; }
        .order-btn:hover { background: rgba(0,245,255,.1); border-color: var(--cyan); }

        @media (max-width: 768px) {
            .portal-wrapper { grid-template-columns: 1fr; }
            .portal-sidebar { display: none; }
            .portal-main { padding: 18px; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .portal-header { flex-direction: column; }
            .form-row,.form-row-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="portal-wrapper">

    <!-- ══ SIDEBAR ══════════════════════════════════════ -->
    <aside class="portal-sidebar">
        <div class="portal-logo">
            <div class="portal-logo-icon">K</div>
            <div class="portal-logo-text">
                <h2>KSS Portal</h2>
                <p id="sidebarVersion">2025 / 26</p>
            </div>
        </div>
        <nav class="portal-nav" id="portal-nav"></nav>
        <div class="portal-back">
            <a href="index.html"><i class="bx bx-home-alt"></i> Back to Home</a>
        </div>
    </aside>

    <!-- ══ MAIN CONTENT ════════════════════════════════ -->
    <main class="portal-main" id="portal-main"></main>
</div>

<!-- ═══════════════════════════════════════════════
     MODALS
════════════════════════════════════════════════ -->

<!-- Homework -->
<div class="modal" id="homeworkModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('homeworkModal')">×</button>
        <h2 class="modal-title"><i class="bx bx-pencil"></i> Assign Homework</h2>
        <form id="homeworkForm">
            <div class="form-group"><label>Class</label>
                <select id="hwClass" required>
                    <option value="">Choose class…</option>
                    <option>Grade 9 Math</option><option>Grade 10 Math</option><option>Grade 11 Math</option><option>Grade 12 Math</option>
                </select>
            </div>
            <div class="form-group"><label>Title</label><input type="text" id="hwTitle" placeholder="e.g. Chapter 5 Exercise" required /></div>
            <div class="form-group"><label>Description</label><textarea id="hwDesc" placeholder="Detailed instructions…" required></textarea></div>
            <div class="form-group"><label>Due Date</label><input type="date" id="hwDueDate" required /></div>
            <button type="submit" class="btn-submit">Assign</button>
            <button type="button" class="btn-secondary" onclick="closeModal('homeworkModal')">Cancel</button>
        </form>
    </div>
</div>

<!-- Create / Edit User -->
<div class="modal" id="createUserModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('createUserModal')">×</button>
        <h2 class="modal-title" id="createUserTitle"><i class="bx bx-user-plus"></i> Add User</h2>
        <form id="createUserForm">
            <input type="hidden" id="editUserIndex" value="-1" />
            <div class="form-row">
                <div class="form-group"><label>First Name</label><input type="text" id="newFirstName" required /></div>
                <div class="form-group"><label>Last Name</label><input type="text" id="newLastName" required /></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Role</label>
                    <select id="newUserRole" required>
                        <option value="">Select role…</option>
                        <option value="student">Student</option>
                        <option value="parent">Parent</option>
                        <option value="teacher">Teacher</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>
                <div class="form-group"><label>Grade (students)</label>
                    <select id="newUserGrade">
                        <option value="">—</option>
                        <option>Grade 6</option><option>Grade 7</option><option>Grade 8</option>
                        <option>Grade 9</option><option>Grade 10</option>
                        <option>Grade 11 (Science)</option><option>Grade 11 (Management)</option><option>Grade 11 (Humanities)</option>
                        <option>Grade 12 (Science)</option><option>Grade 12 (Management)</option><option>Grade 12 (Humanities)</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>Email</label><input type="email" id="newUserEmail" /></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="newUserPhone" placeholder="98XXXXXXXX" /></div>
            <div class="form-group"><label>Address</label><input type="text" id="newUserAddress" /></div>
            <div class="form-row">
                <div class="form-group"><label>Username</label><input type="text" id="newUsername" required /></div>
                <div class="form-group"><label>Password <span id="pwOptLabel" style="color:var(--text-muted);font-size:10px;text-transform:none">(leave blank to keep)</span></label><input type="password" id="newPassword" /></div>
            </div>
            <div id="createUserMsg" style="display:none;margin-bottom:12px;"></div>
            <button type="submit" class="btn-submit" id="createUserBtn">Save</button>
            <button type="button" class="btn-secondary" onclick="closeModal('createUserModal')">Cancel</button>
        </form>
    </div>
</div>

<!-- Assign Parent -->
<div class="modal" id="assignParentModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('assignParentModal')">×</button>
        <h2 class="modal-title"><i class="bx bx-link"></i> Assign Parent</h2>
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:18px;">
            Student: <strong id="assignStudentName" style="color:var(--cyan)"></strong>
        </p>
        <div class="form-group"><label>Select Parent Account</label>
            <select id="parentSelect">
                <option value="">— choose parent —</option>
            </select>
        </div>
        <div class="form-group"><label>Or enter parent username manually</label>
            <input type="text" id="parentManual" placeholder="parent.username" />
        </div>
        <div id="assignParentMsg" style="display:none;margin-bottom:12px;"></div>
        <button type="button" class="btn-submit" onclick="saveParentAssignment()">Assign Parent</button>
        <button type="button" class="btn-secondary" onclick="closeModal('assignParentModal')">Cancel</button>
    </div>
</div>

<!-- Billing -->
<div class="modal" id="billModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('billModal')">×</button>
        <h2 class="modal-title"><i class="bx bx-receipt"></i> Generate Bill</h2>
        <form id="billForm">
            <div class="form-group"><label>Student</label>
                <select id="billStudent" required>
                    <option value="">Select student…</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Month</label>
                    <select id="billMonth" required>
                        <option value="">Month…</option>
                        <option>May 2026</option><option>June 2026</option><option>July 2026</option><option>August 2026</option>
                    </select>
                </div>
                <div class="form-group"><label>Amount (रु.)</label><input type="number" id="billAmount" value="15000" required /></div>
            </div>
            <button type="submit" class="btn-submit">Generate</button>
            <button type="button" class="btn-secondary" onclick="closeModal('billModal')">Cancel</button>
        </form>
    </div>
</div>

<!-- Publish Notice -->
<div class="modal" id="noticeModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal('noticeModal')">×</button>
        <h2 class="modal-title"><i class="bx bx-bell-plus"></i> Publish Notice</h2>
        <form id="noticeForm">
            <div class="form-row">
                <div class="form-group"><label>Date</label><input type="date" id="noticeDate" required /></div>
                <div class="form-group"><label>Category</label>
                    <select id="noticeCategory">
                        <option value="info">Info</option>
                        <option value="urgent">Urgent</option>
                        <option value="event">Event</option>
                        <option value="acad">Academic</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>Title</label><input type="text" id="noticeTitle" placeholder="Notice headline…" required /></div>
            <div class="form-group"><label>Content</label><textarea id="noticeContent" placeholder="Full notice text…" required></textarea></div>
            <button type="submit" class="btn-submit">Publish</button>
            <button type="button" class="btn-secondary" onclick="closeModal('noticeModal')">Cancel</button>
        </form>
    </div>
</div>

<!-- ═══════════════════════════════════════════════
     SCRIPT
════════════════════════════════════════════════ -->
<script>
// ════════════════════════════════════════════
// DATABASE
// ════════════════════════════════════════════
const DB = {
    get:  (k, def=[]) => { try { return JSON.parse(localStorage.getItem(k) || JSON.stringify(def)); } catch { return def; } },
    set:  (k, v)      => localStorage.setItem(k, JSON.stringify(v)),
    raw:  (k)         => localStorage.getItem(k),
    setRaw:(k,v)      => localStorage.setItem(k, v),

    // Users
    getUsers: ()           => DB.get('kss_users', []),
    setUsers: (u)          => DB.set('kss_users', u),
    getUserByUsername: (un) => DB.getUsers().find(u => u.username === un),

    // Pending approvals
    getPending: ()   => DB.get('kss_pending', []),
    setPending: (p)  => DB.set('kss_pending', p),
    addPending: (u)  => { const p = DB.getPending(); p.push(u); DB.setPending(p); },
    approvePending: (un) => {
        let p = DB.getPending();
        const idx = p.findIndex(u => u.username === un);
        if (idx === -1) return false;
        const user = { ...p.splice(idx,1)[0], status:'active', approvedAt: new Date().toISOString() };
        DB.setPending(p);
        const users = DB.getUsers(); users.push(user); DB.setUsers(users);
        return true;
    },
    rejectPending: (un) => {
        DB.setPending(DB.getPending().filter(u => u.username !== un));
    },

    // Notices
    getNotices: ()    => DB.get('kss_notices', []),
    addNotice:  (n)   => { const a = DB.getNotices(); a.unshift({...n, id: Date.now(), createdAt: new Date().toISOString()}); DB.set('kss_notices', a); },
    deleteNotice:(id) => DB.set('kss_notices', DB.getNotices().filter(n => n.id !== id)),

    // Billing
    getBills: ()       => DB.get('kss_bills', []),
    addBill:  (b)      => { const a = DB.getBills(); a.push({...b, id: Date.now(), createdAt: new Date().toISOString()}); DB.set('kss_bills', a); },

    // Homework
    getHomework: ()    => DB.get('kss_homework', []),
    addHomework: (hw)  => { const a = DB.getHomework(); a.push({...hw, id: Date.now()}); DB.set('kss_homework', a); },

    // Security log
    getSecLog: ()      => DB.get('kss_seclog', []),
    addSecLog: (e)     => { const a = DB.getSecLog(); a.unshift({...e, time: new Date().toISOString()}); if(a.length>200)a.pop(); DB.set('kss_seclog', a); },

    // Parent map {studentUsername: parentUsername}
    getParentMap: ()   => DB.get('kss_parent_map', {}),
    setParentAssign: (student, parent) => {
        const m = DB.getParentMap(); m[student] = parent; DB.set('kss_parent_map', m);
    },

    // Homepage content

function renderNoticesPage() {
    const notices = DB.getNotices();
    if (!notices.length) return '<div class="portal-header"><div class="portal-header-left"><h1>Notices</h1></div></div><p style="color:var(--text-muted)">No notices published yet.</p>';
    const rows = notices.map(n => {
        const d = new Date(n.createdAt);
        const dateStr = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
        const pillClass = {urgent:'pill-urgent',event:'pill-event',acad:'pill-acad',info:'pill-info'}[n.category]||'pill-info';
        const cat = n.category ? n.category.charAt(0).toUpperCase()+n.category.slice(1) : 'Info';
        return `<tr><td style="white-space:nowrap">${dateStr}</td><td><span class="notice-pill ${pillClass}">${cat}</span>${n.title}</td><td style="color:var(--text-muted);font-size:12px;max-width:240px">${n.content||''}</td></tr>`;
    }).join('');
    return `<div class="portal-header"><div class="portal-header-left"><h1>Notices</h1></div></div><div class="portal-table-wrapper"><table class="portal-table"><thead><tr><th>Date</th><th>Title</th><th>Details</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderNoticesMgmt() {
    const notices = DB.getNotices();
    const rows = notices.length ? notices.map(n => {
        const d = n.date ? new Date(n.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
                         : new Date(n.createdAt||Date.now()).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
        const pillCls = 'notice-pill pill-'+(n.category||'info');
        const catLabel = (n.category||'info').charAt(0).toUpperCase()+(n.category||'info').slice(1);
        const isHidden = n.hidden === true;
        return `<tr style="${isHidden?'opacity:.5':''}">
            <td style="white-space:nowrap">${d}</td>
            <td><strong>${n.title||''}</strong>${n.content?`<div style="color:var(--text-muted);font-size:11px;margin-top:3px">${n.content.slice(0,80)}${n.content.length>80?'…':''}</div>`:''}</td>
            <td><span class="${pillCls}">${catLabel}</span></td>
            <td><span class="${isHidden?'status-pending':'status-pass'}">${isHidden?'Hidden':'Visible'}</span></td>
            <td style="white-space:nowrap">
                <button class="btn-secondary btn-sm" onclick="toggleNoticeVisibility(${n.id})" style="margin-right:4px" title="${isHidden?'Show on homepage':'Hide from homepage'}">
                    <i class="bx ${isHidden?'bx-show':'bx-hide'}"></i> ${isHidden?'Show':'Hide'}
                </button>
                <button class="btn-danger btn-sm" onclick="deleteNoticeAdmin(${n.id})"><i class="bx bx-trash"></i></button>
            </td>
        </tr>`;
    }).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px">No notices yet. Click "Publish Notice" to add one.</td></tr>';
    return `<div class="portal-header">
        <div class="portal-header-left"><h1>Manage Notices</h1><p>${notices.length} notice${notices.length!==1?'s':''} total · shown on homepage unless hidden</p></div>
        <button class="btn-submit" onclick="initNoticeModal();openModal('noticeModal')"><i class="bx bx-bell-plus"></i> Publish Notice</button>
    </div>
    <div class="portal-table-wrapper"><table class="portal-table">
        <thead><tr><th>Date</th><th>Title / Content</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
    </table></div>`;
}

function renderSecurityPage() {
    const log = DB.getSecLog();
    if (!log.length) return '<div class="portal-header"><div class="portal-header-left"><h1>Security Logs</h1></div></div><p style="color:var(--text-muted)">No failed login attempts recorded.</p>';
    const rows = log.map(e=>`<tr class="${e.attempts>=3?'sec-row-warn':''}"><td>${new Date(e.time).toLocaleString()}</td><td>${e.username}</td><td>${e.role||'—'}</td><td><span style="color:${e.attempts>=3?'var(--coral)':'var(--gold)'}">${e.attempts}</span></td><td style="color:var(--text-muted);font-size:11px">${e.ua||'—'}</td></tr>`).join('');

// PAGE HISTORY + BACK NAVIGATION
// ════════════════════════════════════════════
var _pageHistory = [];
var _currentPage = 'dashboard';

function loadPage(pageId, addToHistory) {
    if (addToHistory !== false && _currentPage !== pageId) {
        _pageHistory.push(_currentPage);
        if (_pageHistory.length > 20) _pageHistory.shift();
    }
    _currentPage = pageId;

    const main = document.getElementById('portal-main');
    const role = userRole;

    if (pageId === 'profile') {
        main.innerHTML = renderProfilePage();
    } else if (role in pageContent && pageId in pageContent[role]) {
        const val = pageContent[role][pageId];
        main.innerHTML = typeof val === 'function' ? val() : val;
    } else {
        main.innerHTML = `<div class="portal-header"><div class="portal-header-left"><h1>Page Not Found</h1></div></div><p style="color:var(--text-muted)">This page does not exist for your role.</p>`;
    }

    // Inject back button when there is history (not on dashboard)
    if (_pageHistory.length > 0 && pageId !== 'dashboard') {
        const backBtn = document.createElement('button');
        backBtn.className = 'btn-secondary btn-sm';
        backBtn.style.cssText = 'display:inline-flex;align-items:center;gap:5px;margin-bottom:18px;';
        backBtn.innerHTML = '<i class="bx bx-arrow-back"></i> Back';
        backBtn.onclick = goBack;
        main.insertBefore(backBtn, main.firstChild);
    }

    // Update active nav link
    document.querySelectorAll('.portal-nav a').forEach(a => a.classList.remove('active'));
    const activeLink = document.querySelector(`.portal-nav a[data-page="${pageId}"]`);
    if (activeLink) activeLink.classList.add('active');
}

function goBack() {
    if (_pageHistory.length > 0) {
        const prev = _pageHistory.pop();
        loadPage(prev, false);
    }
}

// SIDEBAR RENDER
// ════════════════════════════════════════════
function renderNav() {
    const nav = navConfig[userRole] || [];
    const pending = DB.getPending().length;
    const html = nav.map(item => {
        if (item.section) return `<div class="portal-nav section-label">${item.section}</div>`;
        const badge = item.badge === 'pending' && pending > 0
            ? `<span class="nav-badge">${pending}</span>` : '';
        return `<li><a data-page="${item.id}" onclick="loadPage('${item.id}')"><i class="bx ${item.icon}"></i> ${item.label}${badge}</a></li>`;
    }).join('');
    document.getElementById('portal-nav').innerHTML = html;
}

function uploadProfilePic(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
        DB.setPic(userName, e.target.result);
        loadPage('profile');
    };
    reader.readAsDataURL(input.files[0]);
}

function removeProfilePic() {
    DB.removePic(userName);
    loadPage('profile');
}

function saveProfile() {
    const first  = document.getElementById('pFirst')?.value.trim();
    const last   = document.getElementById('pLast')?.value.trim();
    const email  = document.getElementById('pEmail')?.value.trim();
    const phone  = document.getElementById('pPhone')?.value.trim();
    const addr   = document.getElementById('pAddress')?.value.trim();
    const bio    = document.getElementById('pBio')?.value.trim();
    const newPwd = document.getElementById('pNewPwd')?.value;
    const confPwd= document.getElementById('pConfPwd')?.value;
    const msgEl  = document.getElementById('profileMsg');

    if (newPwd && newPwd !== confPwd) {
        msgEl.innerHTML = '<div class="portal-msg error"><i class="bx bx-x-circle"></i> Passwords do not match.</div>';
        return;
    }

    if (userRole === 'admin') {
        const p = DB.getAdminProfile();
        Object.assign(p, { firstName:first, lastName:last, email, phone, address:addr });
        DB.setAdminProfile(p);
    } else {
        const users = DB.getUsers();
        const idx = users.findIndex(u => u.username === userName);
        if (idx !== -1) {
            Object.assign(users[idx], { firstName:first, lastName:last, email, phone, address:addr, bio });
            if (newPwd) users[idx].password = newPwd;
            DB.setUsers(users);
        }
    }

    if (first || last) {
        const newDisplay = [first,last].filter(Boolean).join(' ') || displayName;
        localStorage.setItem('userDisplayName', newDisplay);
    }

    msgEl.innerHTML = '<div class="portal-msg success"><i class="bx bx-check-circle"></i> Profile saved successfully!</div>';
    setTimeout(() => { if(msgEl) msgEl.innerHTML=''; }, 3000);
}

        visible:  true,
    };
    if (idx < t.length) t[idx] = card; else t.push(card);
    DB.setContent('teachers', t);
    document.getElementById('editTeacherForm').style.display = 'none';
    showPortalAlert('Teacher card saved! Refresh homepage to see changes.','success');
    loadPage('homepage');
}

function deleteTeacher(idx) {
    if (!confirm('Remove this teacher card from the homepage?')) return;
    const t = DB.getContent('teachers', []);
    t.splice(idx, 1);
    DB.setContent('teachers', t);
    loadPage('homepage');
}

// Legacy aliases kept for backward compatibility
// Legacy aliases — delegate to the new teacher functions
function toggleLeader(i, v) { toggleTeacher(i, v); }
function moveLeader(i, d)    { moveTeacher(i, d); }
function editLeader(i)       { editTeacher(i); }
function saveLeader()        { saveTeacherCard(); }

// ════════════════════════════════════════════
// BILLING HELPERS
// ════════════════════════════════════════════
function populateBillStudents() {
    const sel = document.getElementById('billStudent');
    sel.innerHTML = '<option value="">Select student…</option>';
    const students = DB.getUsers().filter(u=>u.role==='student');
    const defaults = [{firstName:'Anish',lastName:'Poudel'},{firstName:'Bhumi',lastName:'Sharma'},{firstName:'Chirag',lastName:'Acharya'}];
    [...defaults,...students].forEach(s=>{
        const name = [s.firstName,s.lastName].filter(Boolean).join(' ')||s.username;
        const opt = document.createElement('option');
        opt.value=name; opt.textContent=name; sel.appendChild(opt);
    });
}

// ════════════════════════════════════════════
// MODAL HELPERS
// ════════════════════════════════════════════
function openModal(id)  { document.getElementById(id)?.classList.add('active'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('active'); }

function showPortalAlert(msg, type) {
    const div = document.createElement('div');
    div.className = 'portal-msg ' + (type||'success');
    div.innerHTML = `<i class="bx ${type==='error'?'bx-x-circle':'bx-check-circle'}"></i> ${msg}`;
    div.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;min-width:280px;animation:fadeIn .3s ease';
    document.body.appendChild(div);
    setTimeout(()=>div.remove(), 3000);
}

// HTML escape utility
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ════════════════════════════════════════════
// LOGOUT
// ════════════════════════════════════════════
function logout() {
    localStorage.removeItem('loggedIn');
    localStorage.removeItem('userRole');
    localStorage.removeItem('userName');
    localStorage.removeItem('userDisplayName');
    window.location.href = 'signin.html';
}

// ════════════════════════════════════════════
// FORM EVENT LISTENERS
// ════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {

    // Create / Edit User
    document.getElementById('createUserForm').addEventListener('submit', e => {
        e.preventDefault();
        const editIdx  = parseInt(document.getElementById('editUserIndex').value);
        const first    = document.getElementById('newFirstName').value.trim();
        const last     = document.getElementById('newLastName').value.trim();
        const role     = document.getElementById('newUserRole').value;
        const grade    = document.getElementById('newUserGrade').value;
        const email    = document.getElementById('newUserEmail').value.trim();
        const phone    = document.getElementById('newUserPhone').value.trim();
        const address  = document.getElementById('newUserAddress').value.trim();
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newPassword').value;
        const msgEl    = document.getElementById('createUserMsg');

        if (!first||!last||!role||!username) {
            msgEl.innerHTML='<div class="portal-msg error">Please fill required fields.</div>';
            msgEl.style.display='block'; return;
        }

        const users = DB.getUsers();
        if (editIdx === -1) {
            // Add new
            if (!password) { msgEl.innerHTML='<div class="portal-msg error">Password required for new user.</div>'; msgEl.style.display='block'; return; }
            if (users.some(u=>u.username===username)) { msgEl.innerHTML='<div class="portal-msg error">Username already taken.</div>'; msgEl.style.display='block'; return; }
            users.push({ id:role.slice(0,3).toUpperCase()+'-'+Math.floor(100+Math.random()*900), firstName:first, lastName:last, role, grade, email, phone, address, username, password, status:'active', createdAt:new Date().toISOString() });
        } else {
            // Edit existing
            if (!users[editIdx]) return;
            Object.assign(users[editIdx], { firstName:first, lastName:last, role, grade, email, phone, address, username });
            if (password) users[editIdx].password = password;
        }
        DB.setUsers(users);
        closeModal('createUserModal');
        loadPage('users');
    });

    // Homework
    document.getElementById('homeworkForm').addEventListener('submit', e => {
        e.preventDefault();
        DB.addHomework({ class:document.getElementById('hwClass').value, title:document.getElementById('hwTitle').value, description:document.getElementById('hwDesc').value, dueDate:document.getElementById('hwDueDate').value });
        closeModal('homeworkModal');
        loadPage('homework');
    });

    // Bill
    document.getElementById('billForm').addEventListener('submit', e => {
        e.preventDefault();
        DB.addBill({ student:document.getElementById('billStudent').value, month:document.getElementById('billMonth').value, amount:document.getElementById('billAmount').value });
        closeModal('billModal');
        loadPage('billing');
    });

    // Notice
    document.getElementById('noticeForm').addEventListener('submit', e => {
        e.preventDefault();
        DB.addNotice({
            title:    document.getElementById('noticeTitle').value.trim(),
            content:  document.getElementById('noticeContent').value.trim(),
            category: document.getElementById('noticeCategory').value,
            date:     document.getElementById('noticeDate').value,
        });
        closeModal('noticeModal');
        loadPage('notices_mgmt');
    });

    // Close modals on backdrop click
    document.querySelectorAll('.modal').forEach(m => {
        m.addEventListener('click', e => { if (e.target===m) m.classList.remove('active'); });
    });
});

renderNav();
loadPage('dashboard');
</script>
