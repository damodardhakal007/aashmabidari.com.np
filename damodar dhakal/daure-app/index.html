    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #2196F3;
            --primary-dark: #1976D2;
            --primary-light: #E3F2FD;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #333;
            --text-muted: #777;
            --success: #4CAF50;
            --danger: #F44336;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--card-bg);
            padding: 12px 16px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #00BCD4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 16px;
            flex-shrink: 0;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .search-bar {
            width: 100%;
            height: 42px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            padding: 0 40px 0 16px;
            font-size: 14px;
            background: #f8f9fa;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
            background: white;
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }

        /* Weather Card */
        .weather-card {
            margin: 16px;
            padding: 20px;
            background: linear-gradient(135deg, #2196F3, #1565C0);
            border-radius: var(--radius);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(33, 150, 243, 0.3);
            animation: fadeInDown 0.6s ease;
        }

        .weather-left h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .weather-left .temp {
            font-size: 28px;
            font-weight: 800;
        }

        .weather-left .date-time {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 4px;
        }

        .weather-right {
            text-align: center;
        }

        .clock-container {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 50%;
            position: relative;
        }

        .clock-hand-h, .clock-hand-m, .clock-hand-s {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 2px;
        }

        .clock-hand-h {
            width: 3px;
            height: 22px;
            background: white;
        }

        .clock-hand-m {
            width: 2px;
            height: 30px;
            background: rgba(255,255,255,0.9);
        }

        .clock-hand-s {
            width: 1px;
            height: 32px;
            background: #FF5252;
        }

        .clock-center {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            padding: 3px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 11px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Main Content */
        .main-content {
            padding: 0 16px 100px;
        }

        /* Section */
        .section {
            margin-bottom: 24px;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .section:nth-child(1) { animation-delay: 0.1s; }
        .section:nth-child(2) { animation-delay: 0.2s; }
        .section:nth-child(3) { animation-delay: 0.3s; }
        .section:nth-child(4) { animation-delay: 0.4s; }
        .section:nth-child(5) { animation-delay: 0.5s; }
        .section:nth-child(6) { animation-delay: 0.6s; }
        .section:nth-child(7) { animation-delay: 0.7s; }
        .section:nth-child(8) { animation-delay: 0.8s; }
        .section:nth-child(9) { animation-delay: 0.9s; }
        .section:nth-child(10) { animation-delay: 1.0s; }
        .section:nth-child(11) { animation-delay: 1.1s; }
        .section:nth-child(12) { animation-delay: 1.2s; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .section-toggle {
            background: none;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .section-toggle:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }

        /* Service Grid */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }

        .service-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 4px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text);
        }

        .service-item:hover {
            background: var(--primary-light);
            transform: translateY(-3px);
        }

        .service-item:active {
            transform: scale(0.95);
        }

        .service-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 3px 10px rgba(33, 150, 243, 0.15);
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .service-icon img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .service-icon .fallback {
            font-size: 22px;
        }

        .service-item:hover .service-icon {
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
            transform: scale(1.05);
        }

        .service-name {
            font-size: 10px;
            font-weight: 600;
            text-align: center;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .service-subtitle {
            font-size: 8px;
            color: var(--text-muted);
            text-align: center;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            box-shadow: 0 -2px 15px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 0 12px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #999;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item span {
            font-size: 9px;
            font-weight: 500;
        }

        .nav-item.center {
            position: relative;
            top: -15px;
        }

        .nav-item.center .nav-icon-bg {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }

        .nav-item.center .nav-icon-bg i {
            color: white;
            font-size: 24px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), #00BCD4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 800;
            animation: loadPulse 1.5s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes loadPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(33, 150, 243, 0.3); }
            50% { transform: scale(1.1); box-shadow: 0 8px 30px rgba(33, 150, 243, 0.5); }
        }

        .loading-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .loading-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Responsive */
        @media (min-width: 768px) {
            .service-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }

            .main-content {
                max-width: 800px;
                margin: 0 auto;
            }

            .weather-card {
                max-width: 800px;
                margin: 16px auto;
            }
        }

        @media (min-width: 1024px) {
            .service-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }

            .main-content {
                max-width: 1000px;
            }

            .weather-card {
                max-width: 1000px;
            }
        }

        /* Hidden class for collapsed sections */
        .service-grid.collapsed .service-item:nth-child(n+7) {
            display: none;
        }
    </style>
</head>

                { name: "Kumari", icon: "🏦", url: "https://kumaricapital.com/sip-registration", subtitle: "Sunaulo Lagani" }
            ],
            "Games": [
                { name: "Poki", icon: "🎮", url: "https://poki.com", subtitle: "Online Games" },
                { name: "CrazyGames", icon: "🎮", url: "https://crazygames.com", subtitle: "Browser Games" },
                { name: "Chess.com", icon: "♟️", url: "https://chess.com", subtitle: "Play Chess" },
                { name: "2048", icon: "🔢", url: "https://play2048.co", subtitle: "Puzzle" },
                { name: "Tetris", icon: "🧱", url: "https://tetris.com/play-tetris", subtitle: "Classic" }
            ],
            "Children's Special": [
                { name: "ChuChu TV", icon: "👶", url: "https://chuchutv.com", subtitle: "Rhymes" },

                { name: "Disney Jr", icon: "🍼", url: "https://www.disneynow.com", subtitle: "Storytelling" },
                { name: "Cartoon Network", icon: "🧒", url: "https://www.cartoonnetwork.com", subtitle: "Animation" },
                { name: "Nick India", icon: "👶", url: "https://www.nickindia.com", subtitle: "Cartoons" },
                { name: "CBeebies", icon: "🍼", url: "https://global.cbeebies.com", subtitle: "Preschool" }
            ]
        };

        // ============================================
        // LOADING SCREEN
        // ============================================
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
        });

        // ============================================
        // CLOCK & DATE/TIME
        // ============================================
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const hourDeg = (hours % 12) * 30 + minutes * 0.5;
            const minDeg = minutes * 6;
            const secDeg = seconds * 6;

            const hourHand = document.getElementById('hourHand');
            const minuteHand = document.getElementById('minuteHand');
            const secondHand = document.getElementById('secondHand');

            if (hourHand) {
                hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
                minuteHand.style.transform = `translateX(-50%) rotate(${minDeg}deg)`;
                secondHand.style.transform = `translateX(-50%) rotate(${secDeg}deg)`;
            }

            // Update date-time text
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('en-US', options);
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const dateTimeEl = document.getElementById('dateTime');
            if (dateTimeEl) {
                dateTimeEl.textContent = `${dateStr} | ${timeStr}`;
            }
        }

        setInterval(updateClock, 1000);
        updateClock();

        // Simulated temperature
        document.getElementById('temperature').textContent = '29°C';

        // ============================================
        // RENDER SERVICES
        // ============================================
        function getLogoUrl(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://logo.clearbit.com/${domain}`;
            } catch {
                return null;
            }
        }

        function renderServices() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = '';

            const sectionStates = {};

            Object.entries(services).forEach(([sectionName, items], sectionIndex) => {
                sectionStates[sectionName] = false; // collapsed by default

                const section = document.createElement('div');
                section.className = 'section';

                const header = document.createElement('div');
                header.className = 'section-header';

                const title = document.createElement('h3');
                title.className = 'section-title';
                title.textContent = sectionName;

                const toggle = document.createElement('button');
                toggle.className = 'section-toggle';
                toggle.textContent = 'Show More';

                header.appendChild(title);
                if (items.length > 6) {
                    header.appendChild(toggle);
                }

                const grid = document.createElement('div');
                grid.className = 'service-grid collapsed';

                items.forEach(item => {
                    const link = document.createElement('a');
                    link.className = 'service-item';
                    link.href = item.url;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';

                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'service-icon';

                    const logoUrl = getLogoUrl(item.url);
                    if (logoUrl) {
                        const img = document.createElement('img');
                        img.src = logoUrl;
                        img.alt = item.name;
                        img.onerror = function() {
                            this.style.display = 'none';
                            this.parentElement.querySelector('.fallback').style.display = 'block';
                        };
                        iconDiv.appendChild(img);

                        const fallback = document.createElement('span');
                        fallback.className = 'fallback';
                        fallback.textContent = item.icon;
                        fallback.style.display = 'none';
                        iconDiv.appendChild(fallback);
                    } else {
                        const fallback = document.createElement('span');
                        fallback.className = 'fallback';
                        fallback.textContent = item.icon;
                        iconDiv.appendChild(fallback);
                    }

                    const name = document.createElement('span');
                    name.className = 'service-name';
                    name.textContent = item.name;

                    link.appendChild(iconDiv);
                    link.appendChild(name);

                    if (item.subtitle) {
                        const subtitle = document.createElement('span');
                        subtitle.className = 'service-subtitle';
                        subtitle.textContent = item.subtitle;
                        link.appendChild(subtitle);
                    }

                    grid.appendChild(link);
                });

                toggle.addEventListener('click', () => {
                    const isCollapsed = grid.classList.contains('collapsed');
                    if (isCollapsed) {
                        grid.classList.remove('collapsed');
                        toggle.textContent = 'Show Less';
                    } else {
                        grid.classList.add('collapsed');
                        toggle.textContent = 'Show More';
                    }
                });

                section.appendChild(header);
                section.appendChild(grid);
                mainContent.appendChild(section);
            });
        }

        renderServices();

        // ============================================
        // SEARCH FUNCTIONALITY
        // ============================================
        const searchBar = document.getElementById('searchBar');
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const allItems = document.querySelectorAll('.service-item');
            const sections = document.querySelectorAll('.section');

            if (query === '') {
                sections.forEach(s => s.style.display = '');
                allItems.forEach(item => item.style.display = '');
                document.querySelectorAll('.service-grid').forEach(g => {
                    if (!g.classList.contains('collapsed')) {
                        // Keep it expanded if user expanded it
                    }
                });
                return;
            }

            sections.forEach(section => {
                const items = section.querySelectorAll('.service-item');
                let hasVisible = false;

                items.forEach(item => {
                    const name = item.querySelector('.service-name').textContent.toLowerCase();
                    const subtitle = item.querySelector('.service-subtitle');
                    const sub = subtitle ? subtitle.textContent.toLowerCase() : '';
                    
                    if (name.includes(query) || sub.includes(query)) {
                        item.style.display = '';
                        hasVisible = true;
                    } else {
                        item.style.display = 'none';
                    }
                });

                section.style.display = hasVisible ? '' : 'none';
                
                // Expand grid when searching
                const grid = section.querySelector('.service-grid');
                if (grid && hasVisible) {
                    grid.classList.remove('collapsed');
                }
            });
        });
    </script>
</body>
